<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Measurements</title>
</head>
<body>
    <h1>Add a new Measurements</h1>
    <form action="./measurements" method="POST">
        <input type="number" name="Id" placeholder="Id"><br>
        <input type="number" name="Timestamp" placeholder="Timestamp"><br>
        <input type="number" name="Value" placeholder="Value"><br>
        <input type="number" name="DeviceId" placeholder="DeviceId"><br>
        <button type="submit">Submit</button>
    </form>
</body>
